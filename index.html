<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Educacional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:340px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
  color:#333;
}

input{
  width:100%;
  padding:12px;
  font-size:18px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

button{
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#6c63ff;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#574fd6;
}

.btn-red{
  background:#ff4d4d;
}

.resultado{
  margin-top:10px;
  font-weight:bold;
  font-size:18px;
}

.passos{
  margin-top:10px;
  font-size:14px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora</h2>

<input id="exp" placeholder="Ex: 4-5(-4+5)5">

<div class="grid">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>

<button onclick="add('0')">0</button>
<button onclick="add('(')">(</button>
<button onclick="add(')')">)</button>
<button onclick="add('+')">+</button>

<button onclick="add('[')">[</button>
<button onclick="add(']')">]</button>
<button onclick="add('{')">{</button>
<button onclick="add('}')">}</button>
</div>

<br>

<button onclick="calcular()">Calcular</button>
<button class="btn-red" onclick="limpar()">C</button>
<button onclick="apagarUm()">←</button>

<div class="resultado" id="res"></div>
<div class="passos" id="passos"></div>

</div>

<script>

function add(v){
  document.getElementById("exp").value += v;
}

function limpar(){
  document.getElementById("exp").value = "";
  document.getElementById("res").innerHTML = "";
  document.getElementById("passos").innerHTML = "";
}

function apagarUm(){
  let e = document.getElementById("exp");
  e.value = e.value.slice(0,-1);
}

// Ajusta expressão automaticamente
function ajustar(exp){
  exp = exp.replace(/\[/g,"(")
           .replace(/\]/g,")")
           .replace(/\{/g,"(")
           .replace(/\}/g,")");

  exp = exp.replace(/(\d)(\()/g,"$1*$2");
  exp = exp.replace(/(\))(\d)/g,"$1*$2");

  return exp;
}

function calcular(){
  let original = document.getElementById("exp").value;

  try{
    let exp = ajustar(original);
    let passos = "<b>Passo a passo:</b><br>";

    // PASSO 1 - Parênteses
    let temp = exp;
    while(/\([^()]+\)/.test(temp)){
      let parte = temp.match(/\([^()]+\)/)[0];
      let valor = math.evaluate(parte);
      passos += parte + " = " + valor + "<br>";
      temp = temp.replace(parte, valor);
    }

    // PASSO 2 - Multiplicação/divisão (só se tiver)
    if(/[*\/]/.test(temp)){
      let antes = temp;
      temp = math.evaluate(temp).toString();
      passos += antes + " = " + temp + "<br>";
    }

    // PASSO 3 - Soma/subtração (só se tiver)
    if(/[+-]/.test(temp)){
      let antes = temp;
      temp = math.evaluate(temp).toString();
      passos += antes + " = " + temp + "<br>";
    }

    document.getElementById("res").innerHTML =
      original + " = " + temp;

    document.getElementById("passos").innerHTML = passos;

  }catch{
    document.getElementById("res").innerHTML = "Erro na conta";
    document.getElementById("passos").innerHTML = "";
  }
}

</script>

</body>
</html>
