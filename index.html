<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Educacional</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

button {
  padding: 12px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

.clear {
  background: red;
}

.resultado {
  margin-top: 10px;
  font-weight: bold;
}

.passos {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora</h2>

<input id="exp" placeholder="Ex: -[5+(3-2)*4]">

<div class="grid">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>

<button onclick="add('0')">0</button>
<button onclick="add('(')">(</button>
<button onclick="add(')')">)</button>
<button onclick="add('+')">+</button>

<button onclick="add('[')">[</button>
<button onclick="add(']')">]</button>
<button onclick="add('{')">{</button>
<button onclick="add('}')">}</button>
</div>

<br>

<button onclick="calcular()">Calcular</button>
<button class="clear" onclick="limpar()">Apagar</button>

<div class="resultado" id="res"></div>
<div class="passos" id="passos"></div>

</div>

<script>

function add(v) {
  document.getElementById('exp').value += v;
}

function limpar() {
  document.getElementById('exp').value = "";
  document.getElementById('res').innerHTML = "";
  document.getElementById('passos').innerHTML = "";
}

function normalizar(exp) {
  return exp
    .replace(/\[/g, "(")
    .replace(/\]/g, ")")
    .replace(/\{/g, "(")
    .replace(/\}/g, ")");
}

function calcular() {
  let exp = document.getElementById("exp").value;
  let passos = "<b>Passo a passo:</b><br>";

  try {
    passos += "Expressão: " + exp + "<br>";

    let expJS = normalizar(exp);

    let resultado = eval(expJS);

    passos += "Resolvendo respeitando a ordem:<br>";
    passos += "1) Parênteses / colchetes<br>";
    passos += "2) Multiplicação e divisão<br>";
    passos += "3) Soma e subtração<br>";

    document.getElementById("res").innerHTML = "Resultado: " + resultado;
    document.getElementById("passos").innerHTML = passos;

  } catch {
    document.getElementById("res").innerHTML = "Erro!";
    document.getElementById("passos").innerHTML = "Verifique a conta.";
  }
}

</script>

</body>
</html>
