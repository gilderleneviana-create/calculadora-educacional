<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Educacional</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculadora {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 280px;
    }

    .tela {
      width: 100%;
      height: 50px;
      font-size: 22px;
      margin-bottom: 15px;
      text-align: right;
      padding: 10px;
      border: none;
      background: #f3f3f3;
      border-radius: 10px;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .num {
      background: #e0e0e0;
    }

    .op {
      background: #4facfe;
      color: white;
    }

    .igual {
      background: #00c853;
      color: white;
      grid-column: span 2;
    }

    .limpar {
      background: #ff5252;
      color: white;
    }
  </style>
</head>

<body>

  <div class="calculadora">
    <input type="text" id="tela" class="tela" disabled>

    <div class="botoes">
      <button class="limpar" onclick="limpar()">C</button>
      <button class="op" onclick="adicionar('/')">÷</button>
      <button class="op" onclick="adicionar('*')">×</button>
      <button class="op" onclick="adicionar('-')">−</button>

      <button class="num" onclick="adicionar('7')">7</button>
      <button class="num" onclick="adicionar('8')">8</button>
      <button class="num" onclick="adicionar('9')">9</button>
      <button class="op" onclick="adicionar('+')">+</button>

      <button class="num" onclick="adicionar('4')">4</button>
      <button class="num" onclick="adicionar('5')">5</button>
      <button class="num" onclick="adicionar('6')">6</button>

      <button class="num" onclick="adicionar('1')">1</button>
      <button class="num" onclick="adicionar('2')">2</button>
      <button class="num" onclick="adicionar('3')">3</button>

      <button class="num" onclick="adicionar('0')">0</button>
      <button class="num" onclick="adicionar('.')">.</button>
      <button class="igual" onclick="calcular()">=</button>
    </div>
  </div>

  <script>
    function adicionar(valor) {
      document.getElementById('tela').value += valor;
    }

    function limpar() {
      document.getElementById('tela').value = "";
    }

    function calcular() {
      try {
        let resultado = eval(document.getElementById('tela').value);
        document.getElementById('tela').value = resultado;
      } catch {
        alert("Erro na conta!");
      }
    }
  </script>

</body>
</html>
