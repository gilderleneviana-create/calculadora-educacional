<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Educacional</title>

<!-- biblioteca segura -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:340px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  font-size:18px;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

button{
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

.btn-red{
  background:red;
}

.resultado{
  margin-top:10px;
  font-weight:bold;
}

.passos{
  margin-top:10px;
  font-size:14px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora</h2>

<input id="exp" placeholder="Ex: 4-5*(-4+5)*5">

<div class="grid">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">×</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>

<button onclick="add('0')">0</button>
<button onclick="add('(')">(</button>
<button onclick="add(')')">)</button>
<button onclick="add('+')">+</button>

<button onclick="add('[')">[</button>
<button onclick="add(']')">]</button>
<button onclick="add('{')">{</button>
<button onclick="add('}')">}</button>
</div>

<br>

<button onclick="calcular()">Calcular</button>
<button class="btn-red" onclick="limpar()">C</button>
<button onclick="apagarUm()">←</button>

<div class="resultado" id="res"></div>
<div class="passos" id="passos"></div>

</div>

<script>

function add(v){
  document.getElementById("exp").value += v;
}

function limpar(){
  document.getElementById("exp").value = "";
  document.getElementById("res").innerHTML = "";
  document.getElementById("passos").innerHTML = "";
}

function apagarUm(){
  let e = document.getElementById("exp");
  e.value = e.value.slice(0,-1);
}

function ajustarExpressao(exp){
  // trocar colchetes e chaves por parênteses
  exp = exp.replace(/\[/g,"(")
           .replace(/\]/g,")")
           .replace(/\{/g,"(")
           .replace(/\}/g,")");

  // adicionar multiplicação automática (tipo 5(3+2))
  exp = exp.replace(/(\d)(\()/g,"$1*$2");
  exp = exp.replace(/(\))(\d)/g,"$1*$2");

  return exp;
}

function calcular(){
  let original = document.getElementById("exp").value;

  try{
    let exp = ajustarExpressao(original);

    let passos = "<b>Passo a passo:</b><br>";

    passos += "Expressão: " + original + "<br>";

    if(exp.includes("(")){
      passos += "1) Resolver parênteses<br>";
    }

    if(exp.includes("*") || exp.includes("/")){
      passos += "2) Multiplicação / divisão<br>";
    }

    if(exp.includes("+") || exp.includes("-")){
      passos += "3) Soma / subtração<br>";
    }

    let resultado = math.evaluate(exp);

    document.getElementById("res").innerHTML = "Resultado: " + resultado;
    document.getElementById("passos").innerHTML = passos;

  }catch(e){
    document.getElementById("res").innerHTML = "Erro na conta";
    document.getElementById("passos").innerHTML = "Verifique os sinais.";
  }
}

</script>

</body>
</html>
